<!DOCTYPE html>
<html>
<head>

    <style>
    body{
    margin:0;
    }
    </style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

    <script>

        let xS, yS, dS, rS, vS;
        let xL, yL, dL, rL, vL;
        let day, month, year;

        

        function setup() {
            
        createCanvas(600, 800)
        
        
        dS = min(width, height) * 0.20;
        rS = dS / 2; 
        xS = -rS;
        yS = height / 4;                   
        vS = width / 400; 

        //moon
        dL = dS * 0.5;
        rL = dL / 2;
        xL = -width - rL;
        yL = height / 3;
        vL = vS;


        day = 1;
        month = 1;
        year = 2025;


        }

        function draw() {

        

            
  
        if (xS <= width + rS) {
    
        background(0, 0, 255); 
        } else {
   
        background(10);              
     }


        noStroke();
        fill(20, 120, 40); 
        rect(0, 0.8 * height, width, 0.2 * height);
                
        
        noStroke(); 
        fill(245, 234, 10); 
        circle(xS, yS, dS);

        noStroke();
         fill(200); 
         circle(xL, yL, dL); 

        if (xS >= width * 2 + rS){
        day = day + 1;
        } 
        
        if (day > 30) {
        day = 1; month = month + 1;
        }

        if (month > 12) {
        month = 1; year = year + 1;
        }

        noStroke();
        if (xS <= width + rS) { 
        fill(0);    } 
        else { 
        fill(255); 
        }
        
        
        

        



        xS = xS + vS;

        xL = xL + vL;

       
        if (xS > 2 * width + rS) {

        xS = -rS; xL = -width - rL; 

        }

       

    
        
        noStroke();
        textSize(20);
        text("Date: (" + day + ") (" + month + ") (" + year + ")", width - 200, 20);

        
        textSize(14);
        fill(255);
        text(xS, 10, 10);
        text(xL, 10, 28);

        

        }



    </script>
    
</body>
</html>
