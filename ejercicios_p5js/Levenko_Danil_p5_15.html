<!DOCTYPE html>
<html>
<head>

<style>
body{
margin:0;
}
</style>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

<script>

let xS, yS, dS, rS, vS;
let xL, yL, dL, rL, vL;

let day, month, year;

let xP, yP, S, vP;
let groundY, vY, jumpV, g;

let rHead, bodyL, armL, legL;
let hipY, shoulderY, headY;

let xD, yD, tD, vD;
let disparoActivo;

let xO, yO, wO, hO, vO;

function setup(){

createCanvas(600,800);

dS = min(width,height)*0.20;
rS = dS/2;
xS = -rS;
yS = height/4;
vS = width/400;

dL = dS*0.5;
rL = dL/2;
xL = -width-rL;
yL = height/3;
vL = vS;

day = 1;
month = 1;
year = 2025;

groundY = height*0.8;

S = 0.12*min(width,height);

xP = width*0.25;
yP = groundY;

vP = width/150;

vY = 0;
jumpV = -0.03*height;
g = 0.0016*height;

rHead = 0.20*S;
bodyL = 0.60*S;
armL = 0.45*S;
legL = 0.55*S;

tD = 0.02*min(width,height);
vD = 0.02*height;
disparoActivo = false;

wO = 0.10*width;
hO = 0.05*height;

xO = width/2;
yO = height*0.25;

vO = random(2,5);

}

function draw(){

// cielo
if(xS <= width+rS){
background(0,0,255);
}else{
background(10);
}

// suelo
noStroke();
fill(20,120,40);
rect(0,height*0.8,width,height*0.2);

// sol
fill(245,234,10);
circle(xS,yS,dS);

// luna
fill(200);
circle(xL,yL,dL);

// mover sol y luna
xS = xS + vS;
xL = xL + vL;

if(xS > 2*width+rS){
xS = -rS;
xL = -width-rL;
actualizarCalendario();
}

// mover personaje
if(keyIsDown(LEFT_ARROW)){
xP -= vP;
}

if(keyIsDown(RIGHT_ARROW)){
xP += vP;
}

// mover disparo
if(disparoActivo){

yD = yD - vD;

if(yD < 0){
disparoActivo = false;
}

}

// mover objetivo
xO = xO + vO;

if(xO > width){
xO = -wO;
vO = random(2,5);
}

if(xO < -wO){
xO = width;
vO = -random(2,5);
}

// dibujar cosas
dibujarObjetivo();
dibujarDisparo();
drawStickman();
dibujarCalendario();

}

function keyPressed(){

// salto
if(keyCode === UP_ARROW){
if(yP === groundY){
vY = jumpV;
}
}

// disparo
if(key === ' '){
if(disparoActivo === false){

xD = xP;
yD = headY;

disparoActivo = true;

}
}

}

function drawStickman(){

hipY = yP - legL;
shoulderY = hipY - bodyL;
headY = shoulderY - rHead;

if(xS <= width+rS){
stroke(0);
fill(0);
}else{
stroke(255);
fill(255);
}

strokeWeight(0.06*S);

circle(xP,headY,2*rHead);

line(xP,shoulderY,xP,hipY);

line(xP-0.25*S,shoulderY,xP+0.25*S,shoulderY);

line(xP-0.25*S,shoulderY,xP-0.25*S,shoulderY+armL);
line(xP+0.25*S,shoulderY,xP+0.25*S,shoulderY+armL);

line(xP,hipY,xP-0.18*S,yP);
line(xP,hipY,xP+0.18*S,yP);

vY += g;
yP += vY;

if(yP > groundY){
yP = groundY;
vY = 0;
}

if(xP < 0){
xP = 0;
}

if(xP > width){
xP = width;
}

}

function actualizarCalendario(){

day++;

if(day > 30){
day = 1;
month++;
}

if(month > 12){
month = 1;
year++;
}

}

function dibujarDisparo(){

if(disparoActivo){
fill(255,0,0);
noStroke();
circle(xD,yD,tD);
}

}

function dibujarObjetivo(){

fill(255,100,0);
rect(xO,yO,wO,hO);

}

function dibujarCalendario(){

fill(255);
noStroke();
textSize(20);

text("Date: "+day+"/"+month+"/"+year,width-180,30);

}

</script>

</body>
</html>
