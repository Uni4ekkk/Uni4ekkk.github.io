<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

    <script>

        let xS, yS, dS, rS, vS;
        let xL, yL, dL, rL, vL;

        

        function setup() {
            
        createCanvas(600, 800)
        
        
        dS = min(width, height) * 0.20;
        rS = dS / 2; 
        xS = -rS;
        yS = height / 4;                   
        vS = width / 80; 

        //moon
        dL = dS * 0.5;
        rL = dL / 2;
        xL = -width - rL;
        yL = height / 3;
        vL = vS;
        }

        function draw() {

        

            
  
        if (xS <= width + rS) {
    
        background(0, 0, 255); 
        } else {
   
        background(10);              
     }


        noStroke();
        fill(20, 120, 40); 
        rect(0, 0.8 * height, width, 0.2 * height);
                
        
        noStroke(); 
        fill(245, 234, 10); 
        circle(xS, yS, dS);

        noStroke();
         fill(200); 
         circle(xL, yL, dL); // equivalente a circle(xL, yL, dS*0.5)

        xS = xS + vS;

        xL = xL + vL;

       
        if (xS > 2*width + rS) {

        xS = -rS; xL = -width - rL; 

        }

       

    

        textSize(14);
        stroke(255, 0, 0);
        fill(255);
        text(xS, 10, 10);
        text(xL, 10, 28);

        }



    </script>
    
</body>
</html>
